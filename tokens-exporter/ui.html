<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exportador de Tokens DTCG</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f0e8;
        --panel: rgba(255, 251, 245, 0.88);
        --panel-strong: #fffdf8;
        --line: rgba(62, 42, 24, 0.12);
        --line-strong: rgba(62, 42, 24, 0.2);
        --text: #22170f;
        --muted: #715746;
        --accent: #b24c2a;
        --accent-strong: #8c3518;
        --accent-soft: rgba(178, 76, 42, 0.12);
        --success: #1f7a46;
        --warning: #9a5d00;
        --shadow: 0 24px 60px rgba(78, 42, 18, 0.12);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
        --radius-sm: 10px;
        --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        --display: "Sora", "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font: 13px/1.45 var(--display);
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 168, 120, 0.2),
            transparent 32%
          ),
          radial-gradient(
            circle at right 20%,
            rgba(244, 205, 160, 0.18),
            transparent 28%
          ),
          linear-gradient(180deg, rgba(255, 255, 255, 0.55), transparent 40%),
          var(--bg);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar,
      .main {
        padding: 20px;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.26),
          transparent
        );
      }

      .sidebar .panel {
        position: sticky;
        top: 20px;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
      }

      .panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .panel + .panel {
        margin-top: 14px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin: 0 0 12px;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .selection-list {
        display: grid;
        gap: 10px;
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding-right: 4px;
      }

      .selection-item {
        display: grid;
        gap: 4px;
        padding: 12px;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: var(--panel-strong);
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          background 120ms ease;
      }

      .selection-item:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
      }

      .selection-item input {
        margin: 0;
      }

      .selection-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .selection-name {
        margin: 0;
        font-weight: 600;
      }

      .selection-meta {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        padding: 12px 14px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        background: var(--panel-strong);
        color: var(--text);
        cursor: pointer;
      }

      .button:hover {
        border-color: var(--accent);
      }

      .button-primary {
        border-color: transparent;
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-strong)
        );
        color: #fff8f3;
      }

      .button-primary:hover {
        filter: brightness(1.04);
      }

      .button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .main {
        display: grid;
        gap: 16px;
      }

      .status {
        display: none;
        padding: 12px 14px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .status.visible {
        display: block;
      }

      .status.error {
        border-color: rgba(199, 59, 59, 0.28);
        background: rgba(199, 59, 59, 0.1);
      }

      .status.success {
        border-color: rgba(31, 122, 70, 0.28);
        background: rgba(31, 122, 70, 0.1);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        z-index: 20;
        min-width: 240px;
        max-width: min(420px, calc(100vw - 32px));
        padding: 12px 16px;
        border: 1px solid rgba(31, 122, 70, 0.28);
        border-radius: 999px;
        background: rgba(31, 122, 70, 0.96);
        color: #fff8f3;
        text-align: center;
        box-shadow: var(--shadow);
        transform: translate(-50%, 16px);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 220px;
        padding: 28px;
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius-xl);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.18);
        text-align: center;
      }

      .empty strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-size: 16px;
      }

      .empty p {
        margin: 0;
      }

      .files {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .file-card {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: var(--panel);
        box-shadow: var(--shadow);
        animation: rise 240ms ease;
        align-self: start;
      }

      .file-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .file-title {
        margin: 0;
        font-weight: 600;
      }

      .file-meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .file-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .snippet {
        display: block;
        width: 100%;
        min-height: 220px;
        height: 100%;
        flex: 1;
        padding: 16px;
        border: 0;
        background: transparent;
        color: var(--text);
        overflow: auto;
        resize: none;
        font: 12px/1.55 var(--mono);
      }

      .warnings {
        margin: 0;
        padding: 0 16px 16px;
        list-style: none;
      }

      .warnings li {
        margin-top: 8px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        background: rgba(154, 93, 0, 0.08);
        color: var(--warning);
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font: 600 11px/1 var(--mono);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <section class="panel">
          <div class="section-title">
            <span id="selected-count">0 selecionadas</span>
          </div>
          <div class="selection-list" id="selection-list"></div>
          <div class="actions">
            <button class="button button-primary" id="download-zip" disabled>
              Baixar ZIP
            </button>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="status" id="status"></div>
        <section id="results" class="empty">
          <div>
            <strong>Nada selecionado</strong>
            <p>Selecione uma ou mais collections para visualizar os tokens.</p>
          </div>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" aria-live="polite"></div>

    <script>
      const state = {
        exportables: [],
        files: [],
      };

      const selectionList = document.getElementById("selection-list");
      const selectedCount = document.getElementById("selected-count");
      const results = document.getElementById("results");
      const status = document.getElementById("status");
      const toast = document.getElementById("toast");
      const downloadZipButton = document.getElementById("download-zip");
      let generateTimer = null;
      let toastTimer = null;

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "init") {
          state.exportables = message.exportables || [];
          renderSelectionList();
          updateSummary();
          return;
        }

        if (message.type === "exports-generated") {
          state.files = message.files || [];
          renderFiles();
          clearStatus();
          return;
        }

        if (message.type === "exports-error") {
          setStatus(message.message || "Falha ao gerar os arquivos.", "error");
        }
      };

      downloadZipButton.onclick = async () => {
        if (!state.files.length) {
          return;
        }

        try {
          const blob = createZipBlob(
            state.files.map((file) => ({
              name: file.name,
              content: file.content,
            })),
          );
          downloadBlob(blob, "design-tokens-export.zip");
        } catch (error) {
          setStatus(
            error && error.message ? error.message : "Falha ao gerar o ZIP.",
            "error",
          );
        }
      };

      function renderSelectionList() {
        selectionList.innerHTML = "";

        if (!state.exportables.length) {
          const empty = document.createElement("div");
          empty.className = "selection-item";
          empty.textContent =
            "Nenhuma collection ou estilo local encontrado neste arquivo.";
          selectionList.appendChild(empty);
          updateSelectedCount();
          return;
        }

        state.exportables.forEach((item) => {
          const label = document.createElement("label");
          label.className = "selection-item";

          const head = document.createElement("div");
          head.className = "selection-head";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = true;
          checkbox.dataset.id = item.id;
          checkbox.onchange = () => {
            updateSelectedCount();
            scheduleGenerate();
          };

          const content = document.createElement("div");
          const name = document.createElement("p");
          name.className = "selection-name";
          name.textContent = item.name;

          const meta = document.createElement("p");
          meta.className = "selection-meta";
          meta.textContent = item.count + " itens • " + item.description;

          content.appendChild(name);
          content.appendChild(meta);
          head.appendChild(checkbox);
          head.appendChild(content);
          label.appendChild(head);

          selectionList.appendChild(label);
        });

        updateSelectedCount();
        scheduleGenerate();
      }

      function renderFiles() {
        if (!state.files.length) {
          results.className = "empty";
          results.innerHTML =
            "<div><strong>Nada selecionado</strong><p>Selecione uma ou mais collections para visualizar os tokens.</p></div>";
          downloadZipButton.disabled = true;
          return;
        }

        results.className = "files";
        results.innerHTML = "";

        state.files.forEach((file) => {
          const card = document.createElement("article");
          card.className = "file-card";

          const head = document.createElement("div");
          head.className = "file-head";

          const info = document.createElement("div");
          const title = document.createElement("p");
          title.className = "file-title";
          title.textContent = file.name;

          const meta = document.createElement("p");
          meta.className = "file-meta";
          meta.textContent = file.warnings.length
            ? file.warnings.length +
              " aviso" +
              (file.warnings.length > 1 ? "s" : "")
            : "Sem avisos";

          info.appendChild(title);
          info.appendChild(meta);

          const actions = document.createElement("div");
          actions.className = "file-actions";

          const copyButton = document.createElement("button");
          copyButton.className = "button";
          copyButton.textContent = "Copiar";
          copyButton.onclick = async () => {
            try {
              await copyText(file.content);
              showToast("Copiado: " + file.name);
            } catch (error) {
              setStatus(
                error && error.message
                  ? error.message
                  : "Falha ao copiar o snippet.",
                "error",
              );
            }
          };

          const downloadButton = document.createElement("button");
          downloadButton.className = "button";
          downloadButton.textContent = "Baixar";
          downloadButton.onclick = () => {
            downloadBlob(
              new Blob([file.content], { type: "application/json" }),
              file.name,
            );
          };

          actions.appendChild(copyButton);
          actions.appendChild(downloadButton);
          head.appendChild(info);
          head.appendChild(actions);

          const textarea = document.createElement("textarea");
          textarea.className = "snippet";
          textarea.readOnly = true;
          textarea.value = file.content;

          card.appendChild(head);
          card.appendChild(textarea);

          if (file.warnings.length) {
            const list = document.createElement("ul");
            list.className = "warnings";

            file.warnings.forEach((warning) => {
              const item = document.createElement("li");
              item.textContent = warning;
              list.appendChild(item);
            });

            card.appendChild(list);
          }

          results.appendChild(card);
        });
        downloadZipButton.disabled = false;
      }

      function updateSelectedCount() {
        const selectedIds = getSelectedIds();
        selectedCount.textContent = selectedIds.length + " selecionadas";
      }

      function updateSummary() {
        updateSelectedCount();
      }

      function getSelectedIds() {
        return Array.from(
          selectionList.querySelectorAll('input[type="checkbox"]'),
        )
          .filter((input) => input.checked)
          .map((input) => input.dataset.id);
      }

      function setStatus(message, tone) {
        status.textContent = message;
        status.className = "status visible" + (tone ? " " + tone : "");
      }

      function clearStatus() {
        status.textContent = "";
        status.className = "status";
      }

      function showToast(message) {
        toast.textContent = message;
        toast.className = "toast visible";

        if (toastTimer) {
          clearTimeout(toastTimer);
        }

        toastTimer = setTimeout(() => {
          toast.className = "toast";
          toastTimer = null;
        }, 5000);
      }

      function scheduleGenerate() {
        if (generateTimer) {
          clearTimeout(generateTimer);
        }

        generateTimer = setTimeout(() => {
          generateTimer = null;
          requestGeneration();
        }, 120);
      }

      function requestGeneration() {
        const selectedIds = getSelectedIds();
        if (!selectedIds.length) {
          state.files = [];
          renderFiles();
          clearStatus();
          return;
        }

        setStatus("Gerando arquivos DTCG 2025.10...", "");
        parent.postMessage(
          {
            pluginMessage: {
              type: "generate-exports",
              selectedIds,
            },
          },
          "*",
        );
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      async function copyText(value) {
        if (
          navigator.clipboard &&
          typeof navigator.clipboard.writeText === "function"
        ) {
          try {
            await navigator.clipboard.writeText(value);
            return;
          } catch (_error) {}
        }

        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        textarea.style.pointerEvents = "none";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);

        const copied = document.execCommand("copy");
        textarea.remove();

        if (!copied) {
          throw new Error(
            "O Figma bloqueou a cópia automática neste contexto.",
          );
        }
      }

      function createZipBlob(files) {
        const encoder = new TextEncoder();
        const now = new Date();
        const localParts = [];
        const centralParts = [];
        let offset = 0;

        files.forEach((file) => {
          const fileNameBytes = encoder.encode(file.name);
          const fileData = encoder.encode(file.content);
          const crc = crc32(fileData);
          const timestamp = dateToDos(now);

          const localHeader = concatUint8Arrays([
            uint32LE(0x04034b50),
            uint16LE(20),
            uint16LE(0),
            uint16LE(0),
            uint16LE(timestamp.time),
            uint16LE(timestamp.date),
            uint32LE(crc),
            uint32LE(fileData.length),
            uint32LE(fileData.length),
            uint16LE(fileNameBytes.length),
            uint16LE(0),
            fileNameBytes,
          ]);

          localParts.push(localHeader, fileData);

          const centralHeader = concatUint8Arrays([
            uint32LE(0x02014b50),
            uint16LE(20),
            uint16LE(20),
            uint16LE(0),
            uint16LE(0),
            uint16LE(timestamp.time),
            uint16LE(timestamp.date),
            uint32LE(crc),
            uint32LE(fileData.length),
            uint32LE(fileData.length),
            uint16LE(fileNameBytes.length),
            uint16LE(0),
            uint16LE(0),
            uint16LE(0),
            uint16LE(0),
            uint32LE(0),
            uint32LE(offset),
            fileNameBytes,
          ]);

          centralParts.push(centralHeader);
          offset += localHeader.length + fileData.length;
        });

        const centralDirectory = concatUint8Arrays(centralParts);
        const localDirectory = concatUint8Arrays(localParts);
        const endRecord = concatUint8Arrays([
          uint32LE(0x06054b50),
          uint16LE(0),
          uint16LE(0),
          uint16LE(files.length),
          uint16LE(files.length),
          uint32LE(centralDirectory.length),
          uint32LE(localDirectory.length),
          uint16LE(0),
        ]);

        return new Blob([localDirectory, centralDirectory, endRecord], {
          type: "application/zip",
        });
      }

      function concatUint8Arrays(parts) {
        const totalLength = parts.reduce((sum, part) => sum + part.length, 0);
        const result = new Uint8Array(totalLength);
        let offset = 0;
        parts.forEach((part) => {
          result.set(part, offset);
          offset += part.length;
        });
        return result;
      }

      function uint16LE(value) {
        return new Uint8Array([value & 0xff, (value >> 8) & 0xff]);
      }

      function uint32LE(value) {
        return new Uint8Array([
          value & 0xff,
          (value >> 8) & 0xff,
          (value >> 16) & 0xff,
          (value >> 24) & 0xff,
        ]);
      }

      function dateToDos(date) {
        const year = Math.max(1980, date.getFullYear());
        return {
          time:
            (date.getSeconds() >> 1) |
            (date.getMinutes() << 5) |
            (date.getHours() << 11),
          date:
            date.getDate() |
            ((date.getMonth() + 1) << 5) |
            ((year - 1980) << 9),
        };
      }

      const CRC_TABLE = (() => {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let value = i;
          for (let bit = 0; bit < 8; bit += 1) {
            value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
          }
          table[i] = value >>> 0;
        }
        return table;
      })();

      function crc32(data) {
        let crc = 0xffffffff;
        for (let i = 0; i < data.length; i += 1) {
          crc = CRC_TABLE[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }
    </script>
  </body>
</html>
